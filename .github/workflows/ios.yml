name: iOS Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: List available simulators
        run: xcrun simctl list devices available

      - run: npm ci

      - name: Run iOS tests
        env:
          IOS_DEVICE: iPhone 16 Pro
          IOS_VERSION: "26.2"
        run: npm run test:ios
